{% set version = "0.3.3" %}
{% set sha256 = "4aa4b9b649f85e3fcb343363d97564aa1fb62e249677f2e18a96765145cc0f6e" %}

package:
  name: asciitree
  version: {{ version }}

source:
  fn: asciitree-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/a/asciitree/asciitree-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 3
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - asciitree

about:
  home: http://github.com/mbr/asciitree
  license: MIT
  license_file: LICENSE
  summary: 'Draws ASCII trees.'

extra:
  recipe-maintainers:
    - kain88-de
    - dotsdl
